<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoilProfiles.js - SoilKnowledgeBase Demo</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      margin: 0;
      background: #f4f6f8;
      color: #1f2933;
    }

    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 1.8rem;
    }

    p {
      margin: 0 0 12px 0;
      line-height: 1.4;
    }

    .panel {
      background: #ffffff;
      border: 1px solid #d7dde5;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 18px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.05);
    }

    #interactive {
      width: 100%;
      height: 420px;
      min-height: 420px;
      border: 1px solid #d7dde5;
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    .card {
      border: 1px solid #d7dde5;
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }

    .card h3 {
      margin: 0;
      font-size: 0.95rem;
      padding: 10px 12px;
      border-bottom: 1px solid #e6ebf0;
      background: #f8fafc;
    }

    .card .svg-wrap {
      padding: 8px;
      overflow: auto;
      background: #fff;
    }

    .meta {
      font-size: 0.86rem;
      color: #52606d;
      padding: 0 12px 10px 12px;
    }

    code {
      background: #edf2f7;
      padding: 2px 5px;
      border-radius: 4px;
    }

    a {
      color: #0f62fe;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main>
    <h1>SoilProfiles.js + SoilKnowledgeBase demo</h1>
    <p>
      This page loads real OSD JSON profiles from the
      <a href="https://github.com/ncss-tech/SoilKnowledgeBase" target="_blank" rel="noopener noreferrer">SoilKnowledgeBase</a>
      repository and renders them with <code>SoilProfile</code>, <code>SoilProfileCollection</code>,
      <code>renderInteractive2D</code>, and <code>renderStaticSVG</code>.
    </p>

    <div class="panel">
      <h2>Interactive 2D collection view</h2>
      <p id="summary">Loading profiles...</p>
      <div id="interactive"></div>
    </div>

    <div class="panel">
      <h2>Static SVG cards</h2>
      <div id="cards" class="grid"></div>
    </div>
  </main>

  <script type="module" src="./soilknowledgebase-demo.js"></script>
</body>
</html>
